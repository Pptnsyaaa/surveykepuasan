server {
    listen 80;
    server_name survey-kepuasan.pbjt.web.id;

    # Gunakan DNS Internal Docker Swarm
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 50M;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # 1. Route untuk Backend API
    location /api/ {
        set $upstream_backend http://survey_backend:5000;
        proxy_pass $upstream_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Route untuk Frontend React SPA
    location / {
        set $upstream_frontend http://survey_frontend:80;
        proxy_pass $upstream_frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support untuk React (opsional)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
